<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专注计时器</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f6f6f4;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9e9e9e;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --green-bg:#edf7ee;--green-text:#2d7a38;--green-border:rgba(45,122,56,.35);
  --yellow-bg:#fdf6e3;--yellow-text:#856404;--yellow-border:rgba(133,100,4,.3);
  --blue-bg:#eef4fb;--blue-text:#1a5fa8;--blue-border:rgba(26,95,168,.3);
  --red-text:#b91c1c;--red-border:rgba(185,28,28,.35);--red-bg:#fef2f2;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f0f0f0;--text2:#a0a0a0;--text3:#666;
    --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.22);
    --green-bg:rgba(45,122,56,.2);--green-text:#5ec96b;--green-border:rgba(94,201,107,.3);
    --yellow-bg:rgba(133,100,4,.2);--yellow-text:#e3b84e;--yellow-border:rgba(227,184,78,.3);
    --blue-bg:rgba(26,95,168,.2);--blue-text:#6ba8e0;--blue-border:rgba(107,168,224,.3);
    --red-text:#f87171;--red-border:rgba(248,113,113,.35);--red-bg:rgba(185,28,28,.2);
  }
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;min-height:100vh}
.wrap{max-width:580px;margin:0 auto;padding:2rem 1.25rem 3rem}
.phase{display:none}.phase.active{display:block}

/* typography */
h1{font-size:22px;font-weight:600;color:var(--text)}
.sub{font-size:13px;color:var(--text2)}
.label-xs{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px;display:block}

/* card */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}

/* buttons */
button{font-family:inherit;cursor:pointer;transition:opacity .12s,background .12s,transform .08s;border-radius:var(--radius);font-size:14px;font-weight:500}
button:active{transform:scale(.97)}
.btn-primary{background:var(--text);color:var(--bg);border:none;padding:10px 20px}
.btn-primary:hover{opacity:.82}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:9px 18px}
.btn-ghost:hover{background:var(--bg2)}
.btn-sm-danger{background:transparent;border:1px solid var(--red-border);color:var(--red-text);padding:6px 12px;font-size:12px;border-radius:8px}
.btn-sm-danger:hover{background:var(--red-bg)}
.btn-done{width:100%;display:flex;align-items:center;gap:10px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius);padding:13px 16px;margin-bottom:.9rem;color:var(--green-text)}
.btn-done:hover{opacity:.85}
.btn-done .icon{width:22px;height:22px;border-radius:50%;background:var(--green-text);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-done .icon i{color:var(--green-bg);font-size:13px}

/* textarea & input */
textarea{width:100%;min-height:76px;font-size:15px;resize:vertical;border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;font-family:inherit;color:var(--text);background:var(--bg2);outline:none;transition:box-shadow .15s}
textarea:focus{box-shadow:0 0 0 2.5px rgba(0,0,0,.15)}
input[type=time]{border:none;background:transparent;font-size:14px;font-weight:600;color:var(--text);font-family:inherit;outline:none;cursor:pointer;width:82px}

/* time row */
.time-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.time-pill{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px}
.time-pill label{font-size:12px;color:var(--text3);white-space:nowrap}
.end-badge{font-size:14px;font-weight:600;color:var(--text);padding:6px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}

/* current task mini card */
.cur-card{background:var(--bg2);border-radius:var(--radius);padding:.9rem 1.1rem;margin-bottom:1.25rem}

/* choice buttons — the key fix: clear selected state */
.choice-row{display:flex;gap:10px;margin-top:.75rem;flex-wrap:wrap}
.choice-btn{flex:1;min-width:130px;padding:13px 12px;font-size:14px;font-weight:500;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg2);color:var(--text);transition:border-color .15s,background .15s,color .15s}
.choice-btn:hover{border-color:var(--border2);background:var(--bg)}
.choice-btn.selected{border-color:var(--text);background:var(--text);color:var(--bg)}
.choice-btn.selected:hover{opacity:.88}
.choice-btn i{display:block;margin-bottom:5px;font-size:18px}

/* slider */
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.slider-row input[type=range]{flex:1;accent-color:var(--text)}
.pct{font-size:14px;font-weight:600;color:var(--text);min-width:36px;text-align:right}

/* notice banner */
.notice{font-size:12px;color:var(--yellow-text);background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--radius);padding:7px 11px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* history */
.hist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.dot-done{background:var(--green-bg)}.dot-done i{color:var(--green-text);font-size:12px}
.dot-partial{background:var(--yellow-bg)}.dot-partial i{color:var(--yellow-text);font-size:12px}

/* timer ring */
.timer-center{text-align:center;padding:1.25rem 0 .75rem}
.end-row{text-align:center;font-size:13px;color:var(--text2);margin-bottom:1.1rem}

/* rest */
.rest-big{font-size:60px;font-weight:600;letter-spacing:-2px;color:var(--text);font-variant-numeric:tabular-nums;text-align:center;padding:1.5rem 0 .5rem}

/* session dots */
.dots-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:1.1rem}
.s-dot{width:9px;height:9px;border-radius:50%}

/* divider */
hr{border:none;border-top:1px solid var(--border);margin:1rem 0}

/* modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg);border-radius:var(--radius-lg);padding:1.5rem;max-width:360px;width:100%;border:1px solid var(--border)}
.modal-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:.6rem}
.modal-body{font-size:14px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}

@media(max-width:480px){.wrap{padding:1.25rem .9rem 3rem}}

/* ── 实时可视化方块 ── */
.vis-event-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vis-event-name{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.vis-event-name.vis-hl{color:#7a1e1e;font-weight:600}
.vis-blocks{display:flex;gap:3px;align-items:center}
</style>
</head>
<body>
<!-- SVG hatch patterns for vis blocks -->
<svg width="0" height="0" style="position:absolute;pointer-events:none">
  <defs>
    <pattern id="vis-hg" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999" stroke-width="1.3"/>
    </pattern>
    <pattern id="vis-hr" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#7a1e1e" stroke-width="1.3"/>
    </pattern>
  </defs>
</svg>
<div class="wrap">

<!-- ── SETUP ── -->
<div id="phaseSetup" class="phase active">
  <div style="margin-bottom:1.2rem">
    <h1>本轮任务</h1><span class="sub" style="margin-left:8px">设定接下来30分钟要完成什么</span>
  </div>

  <!-- 选项卡 -->
  <div style="display:flex;gap:6px;margin-bottom:1rem">
    <button id="tabPlan" onclick="switchTab('plan')" style="flex:1;padding:8px;font-size:13px;font-weight:500;border-radius:var(--radius);border:1px solid var(--border2);background:var(--text);color:var(--bg);cursor:pointer">我有计划</button>
    <button id="tabAI" onclick="switchTab('ai')" style="flex:1;padding:8px;font-size:13px;font-weight:500;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer">懒蛋人类</button>
  </div>

  <div class="card">
    <!-- 我有计划模式 -->
    <div id="modePlan">
      <div id="carryNotice" class="notice" style="display:none">
        <i class="ti ti-arrow-right" style="font-size:13px;flex-shrink:0"></i>
        <span>上一轮未完成，已自动带入——可直接编辑</span>
      </div>
      <div class="time-row">
        <div class="time-pill">
          <label>开始</label>
          <input type="time" id="startTimeInput" onchange="updateEndTime()">
          <button onclick="resetToNow()" title="刷新为当前时间" style="background:none;border:none;padding:0 0 0 4px;cursor:pointer;color:var(--text3);display:flex;align-items:center;transition:color .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text3)'">
            <i class="ti ti-refresh" style="font-size:15px"></i>
          </button>
        </div>
        <span style="font-size:13px;color:var(--text3)">→</span>
        <div class="end-badge" id="endTimeBadge">30 分钟后</div>
      </div>
      <span class="label-xs">我想在30分钟内完成…</span>
      <textarea id="taskInput" placeholder="例：写完第三章公式（1）的推导，约三句话"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span id="charCount" style="font-size:12px;color:var(--text3)">0 字</span>
        <button class="btn-primary" id="startBtn" onclick="_hmt.push(['_trackEvent','按钮','开始专注','计划模式']);startSession()" disabled>开始专注 →</button>
      </div>
    </div>

    <!-- 懒蛋人类模式 -->
    <div id="modeAI" style="display:none">
      <div class="time-row">
        <div class="time-pill">
          <label>开始</label>
          <input type="time" id="startTimeInputAI" onchange="updateEndTimeAI()">
          <button onclick="resetToNowAI()" title="刷新为当前时间" style="background:none;border:none;padding:0 0 0 4px;cursor:pointer;color:var(--text3);display:flex;align-items:center;transition:color .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text3)'">
            <i class="ti ti-refresh" style="font-size:15px"></i>
          </button>
        </div>
        <span style="font-size:13px;color:var(--text3)">→</span>
        <div class="end-badge" id="endTimeBadgeAI">30 分钟后</div>
      </div>
      <span class="label-xs">今天想做什么？随便说，AI来拆</span>
      <textarea id="aiGoalInput" placeholder="今天想做什么？随便说，AI来拆。&#10;例：「我要写工作报告」或「昨天写到引言第二段，今天接着写」" style="min-height:76px"></textarea>

      <!-- 任务列表折叠面板 -->
      <div id="aiTaskPanel" style="display:none;margin-top:10px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        <button onclick="toggleTaskPanel()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg2);border:none;color:var(--text2);font-size:13px;cursor:pointer;text-align:left">
          <span id="taskPanelLabel">待办任务</span>
          <i class="ti ti-chevron-down" id="taskPanelIcon" style="font-size:14px;transition:transform .2s"></i>
        </button>
        <div id="taskPanelBody" style="padding:8px 0">
          <div id="aiTaskList"></div>
          <div style="padding:6px 12px 2px;border-top:1px solid var(--border);margin-top:4px">
            <button onclick="askAnotherBatch()" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:4px 0;display:inline-flex;align-items:center;gap:4px" onmouseover="this.style.color='var(--text2)'" onmouseout="this.style.color='var(--text3)'">
              <i class="ti ti-plus" style="font-size:13px"></i>有别的任务要拆
            </button>
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span id="aiStatus" style="font-size:12px;color:var(--text3)"></span>
        <div style="display:flex;gap:8px">
          <button id="aiStartBtn" class="btn-primary" onclick="_hmt.push(['_trackEvent','按钮','开始专注','AI模式']);startSessionFromAI()" style="display:none">开始专注 →</button>
          <button id="aiAskBtn" class="btn-primary" onclick="_hmt.push(['_trackEvent','按钮','AI拆解']);askAI()">让AI来拆 ✦</button>
        </div>
      </div>
    </div>
  </div>

  <div id="historySection" style="display:none;margin-top:1.5rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <span class="label-xs" style="margin-bottom:0">今日记录</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="histSummary" style="font-size:12px;color:var(--text3)"></span>
        <button onclick="_hmt.push(['_trackEvent','按钮','导出','文字版']);exportTxt()" style="background:transparent;border:1px solid var(--border2);color:var(--text2);padding:4px 10px;font-size:12px;border-radius:8px;cursor:pointer" title="导出文字版">
          <i class="ti ti-file-text" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>文字版
        </button>
        <button onclick="_hmt.push(['_trackEvent','按钮','导出','可视化版']);exportVis()" style="background:transparent;border:1px solid var(--border2);color:var(--text2);padding:4px 10px;font-size:12px;border-radius:8px;cursor:pointer" title="导出可视化版">
          <i class="ti ti-chart-bar" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>可视化版
        </button>
      </div>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ── TIMER ── -->
<div id="phaseTimer" class="phase">
  <div class="cur-card">
    <span class="label-xs" id="timerCardLabel">本轮目标</span>
    <div id="timerTaskLabel" style="font-size:15px;line-height:1.5;margin-top:2px"></div>
    <div id="restingNote" style="display:none;font-size:12px;color:var(--blue-text);margin-top:6px">
      <i class="ti ti-coffee"></i> 休息中 · 任务计时已暂存，点「结束休息」继续
    </div>
  </div>
  <div class="dots-row" id="sessionDots"></div>
  <div class="timer-center">
    <svg overflow="visible" width="170" height="170" viewBox="0 0 170 170" style="display:block;margin:0 auto .9rem">
      <circle cx="85" cy="85" r="78" fill="none" stroke="var(--border)" stroke-width="6"/>
      <circle id="ringFill" cx="85" cy="85" r="78" fill="none" stroke="var(--text)" stroke-width="6"
        stroke-linecap="round" stroke-dasharray="490.1" stroke-dashoffset="490.1" transform="rotate(-90 85 85)"/>
      <text x="85" y="81" text-anchor="middle" font-size="40" font-weight="600" fill="var(--text)" id="timerText">30:00</text>
      <text x="85" y="102" text-anchor="middle" font-size="12" fill="var(--text3)" id="timerSubLabel">剩余</text>
    </svg>
  </div>
  <div class="end-row">计划结束：<strong id="timerEndLabel" style="color:var(--text)">—</strong></div>
  <div id="overtimeBuffer" class="notice" style="display:none;text-align:center">
    时间到了！<strong id="bufferCountdown">8</strong> 秒后自动继续正计时
    <div style="margin-top:.7rem">
      <button class="btn-primary" onclick="endRoundFromBuffer()">结束本轮 →</button>
    </div>
  </div>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <button class="btn-ghost" id="pauseBtn" onclick="togglePause()">暂停</button>
    <button class="btn-ghost" id="earlyBtn" onclick="earlyFinish()" style="color:var(--green-text);border-color:var(--green-border)">提前结束</button>
    <button class="btn-ghost" id="restToggleBtn" onclick="toggleRest()" style="color:var(--blue-text);border-color:var(--blue-border)">休息 ☕</button>
    <button class="btn-ghost" id="overtimeStopBtn" onclick="stopOvertime()" style="color:var(--red-text);border-color:var(--red-border);display:none">时间到 →</button>
  </div>
</div>

<!-- ── EARLY FINISH ── -->
<div id="phaseEarly" class="phase">
  <div class="cur-card" style="margin-bottom:1.25rem">
    <span class="label-xs">本轮任务</span>
    <div id="earlyTaskLabel" style="font-size:15px;line-height:1.5;margin-top:2px"></div>
  </div>
  <div class="card">
    <div style="font-size:16px;font-weight:600;margin-bottom:.9rem">提前结束，接下来？</div>
    <div class="choice-row">
      <button class="choice-btn" id="choiceNext" onclick="selectChoice('next')" style="display:none">
        <i class="ti ti-arrow-right"></i>下一个任务
      </button>
      <button class="choice-btn" id="choiceDone" onclick="selectChoice('done')">
        <i class="ti ti-check"></i><span id="choiceDoneLabel">完成！</span>
      </button>
      <button class="choice-btn" id="choicePartial" onclick="selectChoice('partial')">
        <i class="ti ti-progress"></i>未完成！
      </button>
    </div>
    <div style="margin-top:1rem;text-align:right">
      <button class="btn-primary" id="earlyConfirmBtn" onclick="confirmEarlyChoice()" disabled>确认 →</button>
    </div>
  </div>
</div>

<!-- ── FEEDBACK ── -->
<div id="phaseFeedback" class="phase">
  <div class="cur-card" style="margin-bottom:1.1rem">
    <span class="label-xs">本轮目标</span>
    <div id="feedbackTaskLabel" style="font-size:15px;line-height:1.5;margin-top:2px"></div>
  </div>
  <div style="font-size:17px;font-weight:600;margin-bottom:1rem">完成得怎么样？</div>
  <div class="card">
    <div id="doneBtnWrap">
    <button class="btn-done" onclick="markDone()">
      <div class="icon"><i class="ti ti-check"></i></div>
      <span style="font-size:15px;font-weight:600">全部完成 ✓</span>
    </button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:.9rem">
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px">没做完——大约完成了：</div>
      <div class="slider-row">
        <input type="range" min="0" max="95" step="5" value="50" id="progressSlider" oninput="updateSlider(this.value)">
        <span class="pct" id="sliderPct">50%</span>
      </div>
      <button class="btn-primary" style="width:100%;padding:11px" onclick="_hmt.push(['_trackEvent','按钮','记录进度']);markPartial()">记录进度，继续下一轮 →</button>
    </div>
  </div>
</div>

</div>

<!-- reset modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <div class="modal-title">重置今日记录</div>
    <div class="modal-body">确定要清空今日所有记录吗？共 <strong id="resetCount">0</strong> 条，此操作不可撤销。</div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeReset()">取消</button>
      <button class="btn-sm-danger" style="padding:9px 16px;font-size:14px" onclick="doReset()">确认清空</button>
    </div>
  </div>
</div>

<script>
const DURATION=30*60;
let timeLeft=DURATION,timerInterval=null,restInterval=null;
let isPaused=false,currentTask='',history=[],sessionCount=0;
let lastUnfinishedTask=null,sessionEndTime=null,earlyChoice=null,sessionStartTime=null;
let deadlineTs=null,pausedTimeLeft=null; // 方案一：时间戳计时

// ── 超时（正计时）相关 ──
let timerMode='down';            // 'down' 倒计时 | 'buffer' 8秒缓冲 | 'up' 正计时
let bufferInterval=null,bufferLeft=8;
let overtimeBaseSec=0,overtimeSegStart=null; // 正计时累计 + 当前运行段起点
let currentBlocks=1;             // 本轮结算时写入 history 的方块数
// ── 休息（影子任务，与计时共享同一条时间线） ──
let isResting=false;             // 当前显示名是否为「休息」
let segments=[];                 // 本轮已切出的分段 [{name, mins}]，name 为 currentTask 或 '休息'
let segBaseSec=0,segStart=null;  // 当前分段已计累计秒 + 本次运行起点（配合暂停）
let earlyEndTime=null;           // 提前结束时自动捕获的时刻
let feedbackContext='normal';    // 'normal' | 'earlyPlan' | 'earlyAI'

const taskInput=document.getElementById('taskInput');

function fmt(n){return String(n).padStart(2,'0')}
function addMins(t,mins){
  const[h,m]=t.split(':').map(Number);
  const d=new Date();d.setHours(h,m+mins,0,0);
  return fmt(d.getHours())+':'+fmt(d.getMinutes());
}
function initStartTime(){
  const n=new Date();
  const val=fmt(n.getHours())+':'+fmt(n.getMinutes());
  document.getElementById('startTimeInput').value=val;
  document.getElementById('startTimeInputAI').value=val;
  updateEndTime();
  updateEndTimeAI();
}
function resetToNow(){
  const n=new Date();
  document.getElementById('startTimeInput').value=fmt(n.getHours())+':'+fmt(n.getMinutes());
  updateEndTime();
  renderHistory();
}
function updateEndTime(){
  const v=document.getElementById('startTimeInput').value;
  if(!v){document.getElementById('endTimeBadge').textContent='30 分钟后';sessionEndTime=null;return;}
  const end=addMins(v,30);
  document.getElementById('endTimeBadge').textContent=end;
  sessionEndTime=end;
}

taskInput.addEventListener('input',()=>{
  const l=taskInput.value.trim().length;
  document.getElementById('charCount').textContent=l+' 字';
  document.getElementById('startBtn').disabled=l===0;
});

function showPhase(id){document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}

function startSession(){
  currentTask=taskInput.value.trim();if(!currentTask)return;
  sessionCount++;timeLeft=DURATION;isPaused=false;
  deadlineTs=Date.now()+DURATION*1000; // 方案一：记录目标结束时间戳
  pausedTimeLeft=null;
  timerMode='down';overtimeBaseSec=0;overtimeSegStart=null;currentBlocks=1;
  isResting=false;segments=[];segBaseSec=0;segStart=Date.now();
  document.getElementById('restingNote').style.display='none';
  document.getElementById('restToggleBtn').textContent='休息 ☕';
  document.getElementById('restToggleBtn').style.display='';
  clearInterval(bufferInterval);
  document.getElementById('overtimeBuffer').style.display='none';
  document.getElementById('earlyBtn').style.display='';
  document.getElementById('overtimeStopBtn').style.display='none';
  document.getElementById('pauseBtn').style.display='';
  document.getElementById('timerSubLabel').textContent='剩余';
  sessionStartTime=document.getElementById('startTimeInput').value;
  updateEndTime();
  document.getElementById('timerTaskLabel').textContent=currentTask;
  document.getElementById('timerEndLabel').textContent=sessionEndTime||'—';
  updateTimerDisplay();updateRing();updateSessionDots();
  showPhase('phaseTimer');
  document.getElementById('pauseBtn').textContent='暂停';
  clearInterval(timerInterval);
  timerInterval=setInterval(tick,1000);
}

// ── 分段计时：把"自然流逝的这一段"按当前显示名落一笔，再切换到新名字 ──
function currentSegElapsedSec(){
  return segBaseSec+(isPaused?0:(Date.now()-segStart)/1000);
}
function flushSegment(){
  const sec=currentSegElapsedSec();
  const mins=sec/60;
  if(mins>0.0167){ // 至少 1 秒，避免 0 分钟噪音段
    const name=isResting?'休息':currentTask;
    const last=segments[segments.length-1];
    if(last&&last.name===name)last.mins+=mins;
    else segments.push({name,mins});
  }
  segBaseSec=0;segStart=Date.now();
}
function toggleRest(){
  if(timerMode!=='down')return; // 正计时阶段不提供休息入口
  flushSegment();
  isResting=!isResting;
  document.getElementById('restToggleBtn').textContent=isResting?'结束休息':'休息 ☕';
  document.getElementById('restingNote').style.display=isResting?'block':'none';
  document.getElementById('timerCardLabel').textContent=isResting?'休息中':'本轮目标';
}

function tick(){
  if(isPaused)return;
  if(timerMode==='down'){
    // 方案一：每次都从时间戳差值算剩余，后台节流也能回来自动追上
    timeLeft=Math.max(0,Math.round((deadlineTs-Date.now())/1000));
    updateTimerDisplay();updateRing();
    if(timeLeft<=0){clearInterval(timerInterval);enterBuffer();}
  } else if(timerMode==='up'){
    updateTimerDisplay();updateOvertimeRing();
  }
}

// ── 倒计时归零：8 秒缓冲，什么都不点则自动转正计时 ──
function enterBuffer(){
  flushSegment(); // 把走到归零这一刻的分段（任务或休息）落一笔
  timerMode='buffer';bufferLeft=8;
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('earlyBtn').style.display='none';
  document.getElementById('overtimeStopBtn').style.display='none';
  document.getElementById('restToggleBtn').style.display='none'; // 正计时阶段不提供休息入口
  document.getElementById('timerSubLabel').textContent='已到时';
  document.getElementById('timerText').textContent='00:00';
  updateRing();
  const banner=document.getElementById('overtimeBuffer');
  banner.style.display='block';
  document.getElementById('bufferCountdown').textContent=bufferLeft;
  clearInterval(bufferInterval);
  bufferInterval=setInterval(()=>{
    bufferLeft--;
    document.getElementById('bufferCountdown').textContent=Math.max(0,bufferLeft);
    if(bufferLeft<=0){clearInterval(bufferInterval);enterOvertime();}
  },1000);
}

// 缓冲期内点「结束本轮」：按整 30 分钟结算
function endRoundFromBuffer(){
  clearInterval(bufferInterval);clearInterval(timerInterval);
  document.getElementById('overtimeBuffer').style.display='none';
  currentBlocks=1;
  goToFeedback('normal');
}

// 进入正计时（继续累计归零那一刻正在显示的名字：任务或休息）
function enterOvertime(){
  timerMode='up';isPaused=false;
  overtimeBaseSec=0;overtimeSegStart=Date.now();
  segBaseSec=0;segStart=Date.now(); // 分段时钟跟正计时同步重新起算
  document.getElementById('overtimeBuffer').style.display='none';
  document.getElementById('pauseBtn').style.display='';
  document.getElementById('pauseBtn').textContent='暂停';
  document.getElementById('earlyBtn').style.display='none';
  document.getElementById('overtimeStopBtn').style.display='';
  document.getElementById('timerSubLabel').textContent='继续计时';
  clearInterval(timerInterval);
  timerInterval=setInterval(tick,1000);
  updateTimerDisplay();updateOvertimeRing();
}

function overtimeSec(){
  return overtimeBaseSec+(isPaused?0:(Date.now()-overtimeSegStart)/1000);
}

// 正计时阶段点「时间到」：结算，总时长 = 30 + 正计时
function stopOvertime(){
  flushSegment(); // 把正计时这一段也按当前名字（任务或休息）落一笔
  clearInterval(timerInterval);
  const total=DURATION+overtimeSec();
  currentBlocks=total/DURATION; // 30分=1块，零头按比例
  goToFeedback('normal');
}

function togglePause(){
  isPaused=!isPaused;
  if(timerMode==='up'){
    if(isPaused){
      overtimeBaseSec+=(Date.now()-overtimeSegStart)/1000;
    } else {
      overtimeSegStart=Date.now();
    }
  } else {
    if(isPaused){
      // 暂停：保存当前剩余秒数
      pausedTimeLeft=Math.max(0,Math.round((deadlineTs-Date.now())/1000));
    } else {
      // 继续：用剩余秒数重新算 deadline，相当于把终点往后推
      deadlineTs=Date.now()+pausedTimeLeft*1000;
      pausedTimeLeft=null;
    }
  }
  // 分段计时同步暂停/继续（暂停时间不计入任何分段）
  if(isPaused){segBaseSec+=(Date.now()-segStart)/1000;}
  else{segStart=Date.now();}
  document.getElementById('pauseBtn').textContent=isPaused?'继续':'暂停';
}

function goToFeedback(ctx){
  feedbackContext=ctx||'normal';
  document.getElementById('feedbackTaskLabel').textContent=currentTask;
  // 'normal' 显示「全部完成」；提前结束-未完成 只显示进度条
  document.getElementById('doneBtnWrap').style.display=feedbackContext==='normal'?'block':'none';
  showPhase('phaseFeedback');
}

function earlyFinish(){
  flushSegment(); // 提前结束：把走到这一刻的分段（任务或休息）落一笔
  clearInterval(timerInterval);clearInterval(bufferInterval);
  // 自动捕获当前时刻作为结束时间，不再手填
  const n=new Date();
  earlyEndTime=fmt(n.getHours())+':'+fmt(n.getMinutes());
  document.getElementById('earlyTaskLabel').textContent=currentTask;
  earlyChoice=null;
  ['choiceNext','choiceDone','choicePartial'].forEach(id=>document.getElementById(id).classList.remove('selected'));
  document.getElementById('earlyConfirmBtn').disabled=true;
  // 「下一个任务」与「完成！」在我有计划下逻辑相同，统一只留「完成！」；两个模式按钮文案一致
  document.getElementById('choiceNext').style.display='none';
  document.getElementById('choiceDoneLabel').textContent='完成！';
  showPhase('phaseEarly');
}

function selectChoice(c){
  earlyChoice=c;
  ['next','done','partial'].forEach(v=>{
    const el=document.getElementById('choice'+v.charAt(0).toUpperCase()+v.slice(1));
    if(el)el.classList.toggle('selected',c===v);
  });
  document.getElementById('earlyConfirmBtn').disabled=false;
}

// 把本轮已切出的分段（segments）按"任务名合并一条 + 休息合并一条"写入 history。
// pct/done 仅用于任务那一条；休息那一条永远不需要完成度。
function commitSegments(pct,done,endTime){
  let taskMins=0,restMins=0;
  segments.forEach(s=>{
    if(s.name==='休息')restMins+=s.mins;else taskMins+=s.mins;
  });
  if(taskMins>0.0167){
    history.push({task:currentTask,pct,done,session:sessionCount,startTime:sessionStartTime,endTime,early:true,blocks:taskMins/30,mins:Math.round(taskMins)});
  }
  if(restMins>0.0167){
    history.push({task:'休息',pct:100,done:true,session:sessionCount,startTime:sessionStartTime,endTime,early:true,isRest:true,blocks:restMins/30,mins:Math.round(restMins)});
  }
}

function confirmEarlyChoice(){
  const isAI=currentTab==='ai';

  if(earlyChoice==='partial'){
    // 进进度条页（无「完成！」按钮）；记录在进度确认时写入
    goToFeedback(isAI?'earlyAI':'earlyPlan');
    return;
  }

  // 'done'：任务段算 100% 完成，休息段单独成行
  commitSegments(100,true,earlyEndTime);
  lastUnfinishedTask=null;

  if(isAI){
    markAIComplete();
    returnToAIList(earlyEndTime,true);
  } else {
    // 完成！直接入统计，回设置页，输入框清空
    finishToSetup(earlyEndTime,'');
  }
}

// 提前结束后回到设置页（我有计划）
function finishToSetup(newStart,fillText){
  taskInput.value=fillText||'';
  document.getElementById('carryNotice').style.display=fillText?'flex':'none';
  document.getElementById('progressSlider').value=50;
  document.getElementById('sliderPct').textContent='50%';
  if(newStart){
    document.getElementById('startTimeInput').value=newStart;
    document.getElementById('startTimeInputAI').value=newStart;
  }
  updateEndTime();
  const l=taskInput.value.trim().length;
  document.getElementById('charCount').textContent=l+' 字';
  document.getElementById('startBtn').disabled=l===0;
  renderHistory();
  if(currentTab!=='plan')switchTab('plan');
  showPhase('phaseSetup');
  taskInput.focus();
  taskInput.setSelectionRange(taskInput.value.length,taskInput.value.length);
}

// 提前结束后回到 AI 任务列表（懒蛋人类），用户自己挑下一个
// 找下一条「未完成」的任务索引：先从 after 之后找，找不到再从头找
function nextPendingIndex(after){
  const n=aiTasks.length;
  for(let k=1;k<=n;k++){
    const i=((after==null?-1:after)+k)%n;
    if(!completedAITasks.has(i))return i;
  }
  return -1;
}

function returnToAIList(newStart,autoNext,refillIdx,refillText){
  if(newStart){
    document.getElementById('startTimeInput').value=newStart;
    document.getElementById('startTimeInputAI').value=newStart;
  }
  updateEndTime();updateEndTimeAI();
  // 清空「我有计划」对话框，避免 AI 任务文本残留串台到 plan 框
  taskInput.value='';
  document.getElementById('carryNotice').style.display='none';
  document.getElementById('charCount').textContent='0 字';
  document.getElementById('startBtn').disabled=true;
  editingAITaskIndex=null;
  if(refillIdx!=null && refillIdx>=0 && refillIdx<aiTasks.length){
    // 未完成：把该任务回填进「懒蛋人类」对话框，可继续或改选；标进行中由调用方负责
    aiTaskIndex=refillIdx;
    editingAITaskIndex=refillIdx;
    document.getElementById('aiGoalInput').value=aiTasks[refillIdx];
    document.getElementById('aiStartBtn').style.display='inline-block';
  } else if(refillText){
    // 未完成但任务非来自列表（手打文本）：仍回填进「懒蛋人类」对话框
    aiTaskIndex=-1;
    document.getElementById('aiGoalInput').value=refillText;
    document.getElementById('aiStartBtn').style.display='inline-block';
  } else if(autoNext){
    const j=nextPendingIndex(runningAITaskIndex);
    if(j>=0){
      aiTaskIndex=j;
      editingAITaskIndex=j; // 自动填充并可编辑（改字同步列表）
      document.getElementById('aiGoalInput').value=aiTasks[j];
      document.getElementById('aiStartBtn').style.display='inline-block';
    } else {
      aiTaskIndex=-1;
      document.getElementById('aiGoalInput').value='';
      document.getElementById('aiStartBtn').style.display='none';
    }
  } else {
    aiTaskIndex=-1; // 不预选，等用户自己挑
    document.getElementById('aiGoalInput').value='';
    document.getElementById('aiStartBtn').style.display='none';
  }
  renderAITaskList();
  renderHistory();
  if(currentTab!=='ai')switchTab('ai');
  showPhase('phaseSetup');
}

// 把当前运行的 AI 任务标记为完成（删除线），移出进行中
function markAIComplete(){
  if(runningAITaskIndex!=null){
    completedAITasks.add(runningAITaskIndex);
    inProgressAITasks.delete(runningAITaskIndex);
    renderAITaskList();
  }
}
// 把当前运行的 AI 任务标记为进行中（未完成，可多个并存）
function markAIInProgress(){
  if(runningAITaskIndex!=null && !completedAITasks.has(runningAITaskIndex)){
    inProgressAITasks.add(runningAITaskIndex);
    renderAITaskList();
  }
}

function timeDiffMins(fromStr,toStr){
  const[fh,fm]=fromStr.split(':').map(Number);
  const[th,tm]=toStr.split(':').map(Number);
  let diff=(th*60+tm)-(fh*60+fm);
  if(diff<0)diff+=24*60;
  return diff;
}

function prepareNextTask(newStart){
  taskInput.value='';
  document.getElementById('carryNotice').style.display='none';
  document.getElementById('charCount').textContent='0 字';
  document.getElementById('startBtn').disabled=true;
  document.getElementById('progressSlider').value=50;
  document.getElementById('sliderPct').textContent='50%';
  if(newStart){
    document.getElementById('startTimeInput').value=newStart;
    document.getElementById('startTimeInputAI').value=newStart;
  }
  updateEndTime();
  renderHistory();
  showPhase('phaseSetup');
  taskInput.focus();
}

function updateTimerDisplay(){
  if(timerMode==='up'){
    const t=Math.floor(overtimeSec());
    document.getElementById('timerText').textContent='+'+fmt(Math.floor(t/60))+':'+fmt(t%60);
    return;
  }
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  document.getElementById('timerText').textContent=fmt(m)+':'+fmt(s);
}
function updateRing(){
  const c=490.1,p=Math.min(1,(DURATION-timeLeft)/DURATION);
  document.getElementById('ringFill').setAttribute('stroke-dashoffset',(c*(1-p)).toFixed(1));
}
// 正计时圆环：不代表真实进度，只是持续循环填充，作为视觉参照物；无时长上限，一直转下去
const OVERTIME_RING_CYCLE=60; // 每 60 秒转满一圈，纯视觉节奏
function updateOvertimeRing(){
  const c=490.1;
  const sec=overtimeSec();
  const p=(sec%OVERTIME_RING_CYCLE)/OVERTIME_RING_CYCLE;
  document.getElementById('ringFill').setAttribute('stroke-dashoffset',(c*(1-p)).toFixed(1));
}
function updateSessionDots(){
  const el=document.getElementById('sessionDots');el.innerHTML='';
  for(let i=0;i<sessionCount;i++){
    const d=document.createElement('div');
    d.className='s-dot';
    d.style.background=i===sessionCount-1?'var(--text)':'var(--green-text)';
    el.appendChild(d);
  }
}
function updateSlider(v){document.getElementById('sliderPct').textContent=v+'%';}

function markDone(){
  // 只在 normal 上下文可达（提前结束-未完成时此按钮隐藏）；自然结束时把最后一段也落一笔
  flushSegment();
  commitSegments(100,true,sessionEndTime);
  lastUnfinishedTask=null;
  if(currentTab==='ai'){
    markAIComplete();
    returnToAIList(sessionEndTime,true);
  } else {
    finishRoundPlan(false);
  }
}
function markPartial(){
  const pct=parseInt(document.getElementById('progressSlider').value);
  if(feedbackContext==='earlyPlan'){
    commitSegments(pct,false,earlyEndTime);
    lastUnfinishedTask=currentTask;
    finishToSetup(earlyEndTime,currentTask); // 自动回填同样文本
    return;
  }
  if(feedbackContext==='earlyAI'){
    commitSegments(pct,false,earlyEndTime);
    markAIInProgress();
    // 未完成 → 该任务回填进「懒蛋人类」对话框，标进行中，由用户决定继续或改选
    returnToAIList(earlyEndTime,false,runningAITaskIndex,currentTask);
    return;
  }
  // normal：自然结束时把最后一段也落一笔
  flushSegment();
  commitSegments(pct,false,sessionEndTime);
  if(currentTab==='ai'){
    markAIInProgress();
    returnToAIList(sessionEndTime,false,runningAITaskIndex,currentTask);
  } else {
    lastUnfinishedTask=currentTask;
    finishRoundPlan(true);
  }
}
function finishRoundPlan(carry){
  document.getElementById('progressSlider').value=50;
  document.getElementById('sliderPct').textContent='50%';
  const notice=document.getElementById('carryNotice');
  if(carry&&lastUnfinishedTask){
    taskInput.value=lastUnfinishedTask;
    notice.style.display='flex';
  } else {
    taskInput.value='';
    notice.style.display='none';
  }
  const l=taskInput.value.trim().length;
  document.getElementById('charCount').textContent=l+' 字';
  document.getElementById('startBtn').disabled=l===0;
  if(sessionEndTime)document.getElementById('startTimeInput').value=sessionEndTime;
  updateEndTime();renderHistory();
  if(currentTab!=='plan')switchTab('plan');
  showPhase('phaseSetup');
  taskInput.focus();
  taskInput.setSelectionRange(taskInput.value.length,taskInput.value.length);
}

function makeVisBlock(BW,BH,BR,fillAmt,isRed){
  const stroke=isRed?'#7a1e1e':'#aaa';
  const hatch=isRed?'url(#vis-hr)':'url(#vis-hg)';
  const sw=isRed?1.5:1;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  const isHalf=fillAmt>0&&fillAmt<1;
  const isEmpty=fillAmt===0;
  const W=isHalf?Math.max(8,Math.round(BW*fillAmt+4)):BW;
  svg.setAttribute('width',W);svg.setAttribute('height',BH);
  svg.style.cssText='display:block;flex-shrink:0';
  if(!isEmpty){
    const clipId='vc'+Math.random().toString(36).slice(2,7);
    const defs=document.createElementNS(ns,'defs');
    const cp=document.createElementNS(ns,'clipPath');
    cp.setAttribute('id',clipId);
    const cr=document.createElementNS(ns,'rect');
    cr.setAttribute('x','1');cr.setAttribute('y','1');
    cr.setAttribute('width',W-2);cr.setAttribute('height',BH-2);
    cp.appendChild(cr);defs.appendChild(cp);svg.appendChild(defs);
    const fr=document.createElementNS(ns,'rect');
    fr.setAttribute('x','1');fr.setAttribute('y','1');
    fr.setAttribute('width',W-2);fr.setAttribute('height',BH-2);
    fr.setAttribute('rx',BR);fr.setAttribute('fill',hatch);
    fr.setAttribute('clip-path','url(#'+clipId+')');
    svg.appendChild(fr);
  }
  const border=document.createElementNS(ns,'rect');
  border.setAttribute('x','1');border.setAttribute('y','1');
  border.setAttribute('width',W-2);border.setAttribute('height',BH-2);
  border.setAttribute('rx',BR);border.setAttribute('fill','none');
  border.setAttribute('stroke',stroke);border.setAttribute('stroke-width',sw);
  border.setAttribute('stroke-dasharray','4 3');
  svg.appendChild(border);
  return svg;
}

function renderHistory(){
  const sec=document.getElementById('historySection');
  const list=document.getElementById('historyList');
  if(history.length===0){sec.style.display='none';return;}
  sec.style.display='block';
  const done=history.filter(h=>h.done).length;
  document.getElementById('histSummary').textContent=done+' 完成 / '+history.length+' 轮 · 专注约 '+totalFocusMins()+' 分钟';

  // 按任务名全局合并（不要求相邻），保留首次出现顺序
  const evtMap=new Map();
  const evts=[];
  history.forEach(item=>{
    const b=item.blocks!=null?item.blocks:(item.early?0.5:1);
    const name=item.task.trim();
    let ev=evtMap.get(name);
    if(ev){
      ev.endTime=item.endTime||ev.endTime;
      ev.blocks+=b;
      ev.allDone=ev.allDone&&item.done;
      ev.early=ev.early||(item.early||false);
      ev.lastPct=item.done?100:item.pct;
    } else {
      ev={
        name,
        startTime:item.startTime||'',
        endTime:item.endTime||'',
        blocks:b,
        allDone:item.done,
        early:item.early||false,
        lastPct:item.done?100:item.pct,
      };
      evtMap.set(name,ev);
      evts.push(ev);
    }
  });

  const maxBlocks=Math.max(...evts.map(e=>e.blocks));
  const BW=36,BH=32,BR=3;

  list.innerHTML='';
  // 倒序显示（最新在上）
  evts.slice().reverse().forEach(ev=>{
    const isLongest=ev.blocks===maxBlocks;
    const row=document.createElement('div');
    row.className='vis-event-row';

    const nameEl=document.createElement('div');
    nameEl.className='vis-event-name'+(isLongest?' vis-hl':'');
    nameEl.textContent=ev.name;
    row.appendChild(nameEl);

    const blocksEl=document.createElement('div');

    let rem=ev.blocks;
    const ownCols=Math.ceil(rem-1e-9); // 极小容差避免浮点误差多算一格
    for(let i=0;i<ownCols;i++){

// ── 导出：合并同名跨轮任务为事件 ──
function buildEvents(){
  const eventMap=new Map();
  const events=[];
  history.forEach(item=>{
    const b=item.blocks!=null?item.blocks:(item.early?(item.earlyFill||0.5):1);
    const name=item.task.trim();
    let ev=eventMap.get(name);
    if(ev){
      // 同名任务：全局合并（不要求相邻）
      ev.endTime=item.endTime||ev.endTime;
      ev.sessions.push(item);
      ev.totalPct=(ev.totalPct||100)+( item.done?100:item.pct );
      ev.allDone=ev.allDone&&item.done;
      ev.anyEarly=ev.anyEarly||(item.early||false);
      ev.blocks+=b;
    } else {
      ev={
        name,
        startTime: item.startTime||'',
        endTime: item.endTime||'',
        sessions:[item],
        allDone: item.done,
        anyEarly: item.early||false,
        blocks: b,
      };
      eventMap.set(name,ev);
      events.push(ev);
    }
  });
  return events;
}

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';

// 真实专注分钟总和（含超时、含提前结束的实际时长）；旧记录无 mins 时回退
function totalFocusMins(){
  return Math.round(history.reduce((s,it)=>{
    let m=it.mins;
    if(m==null)m=it.blocks!=null?it.blocks*30:(it.early?15:30);
    return s+m;
  },0));
}

function statusLabel(ev){
  if(ev.sessions.length===1){
    const s=ev.sessions[0];
    if(s.done&&s.early) return '提前完成';
    if(s.done) return '✓ 完成';
    return s.pct+'%';
  }
  // 跨轮
  const last=ev.sessions[ev.sessions.length-1];
  const first=ev.sessions[0];
  if(!first.done){
    if(last.done) return first.pct+'%→✓';
    return first.pct+'%→'+last.pct+'%';
  }
  return '✓ 完成';
}

function timeRange(ev){
  const start=ev.sessions[0].startTime||'';
  const end=ev.endTime||ev.sessions[ev.sessions.length-1].endTime||'';
  if(!start&&!end) return '';
  if(!start) return '→'+end;
  if(!end) return start+'→';
  return start+'–'+end;
}

function downloadHTML(html, filename){

  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

function exportVis(){
  if(history.length===0) return;
  const events=buildEvents();
  const done=history.filter(h=>h.done).length;
  const total=history.length;
  const mins=totalFocusMins();
  const date=todayStr();
  const maxBlocks=Math.max(...events.map(e=>e.blocks));
  const BW=36,BH=32,BR=3;

  function blockSVG(fillAmt,isRed){
    const stroke=isRed?'#7a1e1e':'#aaa';
    const hatchId=isRed?'hr':'hg';
    const sw=isRed?1.5:1;
    const isHalf=fillAmt>0&&fillAmt<1;
    const W=isHalf?Math.max(8,Math.round(BW*fillAmt+4)):BW;
    const clipId='cl'+Math.random().toString(36).slice(2,7);
    let inner='';
    if(fillAmt>0){
      inner=`<defs><clipPath id="${clipId}"><rect x="1" y="1" width="${W-2}" height="${BH-2}"/></clipPath></defs>`+
        `<rect x="1" y="1" width="${W-2}" height="${BH-2}" rx="${BR}" fill="url(#${hatchId})" clip-path="url(#${clipId})"/>`;
    }
    return `<svg width="${W}" height="${BH}" style="display:block;flex-shrink:0">${inner}`+
      `<rect x="1" y="1" width="${W-2}" height="${BH-2}" rx="${BR}" fill="none" stroke="${stroke}" stroke-width="${sw}" stroke-dasharray="4 3"/></svg>`;
  }

  let rows='';

      <div style="font-size:12px;color:${nameColor};font-weight:${nameWeight};flex-shrink:0;white-space:nowrap">${esc(ev.name)}</div>
      <div style="display:flex;gap:4px;align-items:center">${blockHtml}</div>
    </div>`;
  });

  const pct=Math.round(done/total*100);
  const html=`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>${date} 论文专注记录</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB',sans-serif;max-width:560px;margin:2.5rem auto;padding:0 1.5rem;color:#1a1a1a;font-size:14px}

.stat-val{font-size:15px;font-weight:600;color:#1a1a1a}
.stat-lbl{font-size:10px;color:#999;margin-top:1px}
.date{font-size:13px;color:#888;margin-bottom:1.2rem}
</style></head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <pattern id="hg" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999" stroke-width="1.3"/>
    </pattern>
    <pattern id="hr" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#7a1e1e" stroke-width="1.3"/>
    </pattern>
  </defs>
</svg>
<div class="stats">

  <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">完成率</div></div>
  <div class="stat"><div class="stat-val">${mins} 分</div><div class="stat-lbl">专注时长</div></div>

  downloadHTML(html, date.replace(/年|月/g,'-').replace('日','')+'_专注记录_可视化版.html');

// ── 调用 DeepSeek（多轮对话）──
let aiConversation=[]; // 对话历史

const AI_SYSTEM_PROMPT=`你是一个专注任务拆解助手。用户告诉你今天想做什么，你帮他们拆解成若干个30分钟的具体任务。

## 你的工作流程

**第一步：识别任务类型**
根据用户输入判断属于哪类任务：
学术写作、定理证明/推导、文献调研、读文献/读书、代码开发、数据处理/分析、翻译、修改润色、PPT/汇报、考试备考、背诵记忆、练习（乐器/口语）、运动训练、讨论/会议准备、工作任务、其他

**第二步：判断信息是否足够**
核心标准：我能不能给出一个用户今天坐下来就能立刻开始执行的第一步？
- 能 → 直接输出任务列表
- 不能 → 追问，最多问2个问题，不要同时问超过2个

**不同类型的追问重点：**
- 学术写作：写到哪了？这次想完成哪一块？
- 定理证明：证明什么定理？已经推到哪一步了？
- 代码：什么语言？实现什么功能？
- 读文献：读什么主题？目标是泛读还是精读做笔记？
- 运动：新手还是有基础？目标是什么（减脂/增肌/耐力）？今天有多少时间？
- 考试备考：考什么？哪个部分最需要攻克？距离考试还有多久？
- 工作任务：产出是什么？给谁看？
- 背诵记忆：用什么教材或范围？今天的目标量？
- 其他：产出是什么？完成的标准是什么？

## 拆解原则
- 每个任务是一个具体动作，不是一个主题
- 每个任务30分钟内可以完成
- 任务之间有顺序逻辑
- 任务描述简短直接，15字以内
- 不预判内容数量，把"确认内容范围"本身作为第一个任务
- 根据任务类型决定粒度，不要套用统一标准

**不同类型的粒度示例：**
- 学术写作："写引言第一段点明背景"，不是"写引言"
- 定理证明："尝试用反证法推第一步"，不是"证明定理"
- 代码：根据用户描述的功能判断合理起点，不固定从某个地方开始
- 读文献："读第二节并用一句话总结核心论点"，不是"读论文"
- 运动（新手）："完成10分钟热身+基础动作讲解视频"
- 运动（有基础）："完成第一组力量训练：深蹲4×12"
- 考试备考："做错题本上高频错题10道"，不是"复习"
- 背单词："背GRE单词表第3组前50个，过一遍"
- 工作任务："列出报告的三级提纲"，不是"写报告"

## 输出格式（严格遵守，不能有任何其他内容）

需要追问时，只输出：
QUESTION: [你的问题]

可以拆解时，只输出：
TASKS:
1. [任务一]
2. [任务二]
3. [任务三]
...

绝对不要输出QUESTION和TASKS以外的任何内容，不要解释，不要寒暄，不要"好的"、"明白了"之类的开场白。`;

async function askAI(){
  const input=document.getElementById('aiGoalInput').value.trim();
  if(!input)return;
  editingAITaskIndex=null; // 点「让AI来拆」即把输入当作新指令，退出编辑某条的状态
  const key=['sk-e75e4','8ae373d4','e8db2841','d6466ebba68'].join('');

  const btn=document.getElementById('aiAskBtn');
  btn.disabled=true;btn.textContent='AI思考中…';
  document.getElementById('aiStatus').textContent='';

  // 把用户输入加入对话历史
  aiConversation.push({role:'user',content:input});

  try{
    const res=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'deepseek-chat',
        max_tokens:600,
        messages:[
          {role:'system',content:AI_SYSTEM_PROMPT},
          ...aiConversation
        ]
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      if(res.status===401) document.getElementById('aiStatus').textContent='API Key 无效，请联系工具作者';
      else document.getElementById('aiStatus').textContent='请求失败：'+(err.error?.message||res.status);
      aiConversation.pop(); // 失败时回滚
      btn.disabled=false;btn.textContent='让AI来拆 ✦';return;
    }
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content?.trim()||'';

    // 把AI回复加入对话历史
    aiConversation.push({role:'assistant',content:reply});

    if(reply.startsWith('QUESTION:')){
      // AI需要追问
      const question=reply.replace('QUESTION:','').trim();
      document.getElementById('aiGoalInput').value='';
      document.getElementById('aiGoalInput').placeholder=question;
      document.getElementById('aiStatus').textContent='↑ '+question;
      document.getElementById('aiGoalInput').focus();
    } else if(reply.startsWith('TASKS:')){
      // AI给出任务列表
      const lines=reply.replace('TASKS:','').trim().split('\n').map(l=>l.trim()).filter(l=>l);
      const tasks=lines.map(l=>l.replace(/^\d+[\.、。\)）]\s*/,'').trim()).filter(l=>l.length>0);
      if(!tasks.length){
        document.getElementById('aiStatus').textContent='AI没有返回有效任务，请重试';
        btn.disabled=false;btn.textContent='让AI来拆 ✦';return;
      }
      applyParsedTasks(tasks);
      // 重置输入框placeholder
      document.getElementById('aiGoalInput').placeholder='今天想做什么？随便说，AI来拆。\n例：「我要写工作报告」或「昨天写到引言第二段，今天接着写」';
      document.getElementById('aiStatus').textContent='';
    } else {
      // 兜底：尝试直接解析
      const lines=reply.split('\n').map(l=>l.trim()).filter(l=>l);
      const tasks=lines.map(l=>l.replace(/^\d+[\.、。\)）]\s*/,'').trim()).filter(l=>l.length>0);
      if(tasks.length){
        applyParsedTasks(tasks);
        document.getElementById('aiGoalInput').placeholder='今天想做什么？随便说，AI来拆。\n例：「我要写工作报告」或「昨天写到引言第二段，今天接着写」';
      } else {
        document.getElementById('aiStatus').textContent='格式异常，请重试';
      }
    }
  }catch(e){
    document.getElementById('aiStatus').textContent='网络错误，请检查连接';
    aiConversation.pop();
  }
  btn.disabled=false;btn.textContent='让AI来拆 ✦';
}

// 应用拆解结果：追加模式接在末尾并保留状态，否则替换并重置
function applyParsedTasks(tasks){
  if(appendMode){
    const base=aiTasks.length;
    aiTasks=aiTasks.concat(tasks);
    aiTaskIndex=base;                 // 选中第一条新任务
    editingAITaskIndex=base;          // 视为"已从列表选中"，可直接开始
    appendMode=false;
  } else {
    aiTasks=tasks;
    aiTaskIndex=0;
    completedAITasks=new Set();
    inProgressAITasks=new Set();
    editingAITaskIndex=0;
  }
  renderAITaskList();
  showAICurrentTask(aiTasks[aiTaskIndex]);
}

// 轮次结束后推进 AI 任务队列
function advanceAITask(){
  if(!aiTasks.length)return;
  if(aiTaskIndex<aiTasks.length-1){
    aiTaskIndex++;
    renderAITaskList();
    return aiTasks[aiTaskIndex];
  }
  return null;
}

// close modal on overlay click
document.getElementById('resetModal').addEventListener('click',function(e){if(e.target===this)closeReset();});

initStartTime();
</script>
